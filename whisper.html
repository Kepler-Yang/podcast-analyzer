<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Podcast分析助手</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-color: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg-color);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #333;
        }

        .hero-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 4rem 0;
            margin-bottom: 2rem;
            border-bottom: 4px solid var(--primary-color);
        }

        .glass-card {
            background: white;
            border: none;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }

        .timestamp-badge {
            background-color: #e2e8f0;
            color: #475569;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .insight-text {
            line-height: 1.8;
            text-align: justify;
        }

        .highlight-item {
            border-left: 3px solid var(--primary-color);
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .download-btn-group .btn {
            padding: 0.8rem 1.5rem;
            font-weight: 600;
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .empty-state {
            color: #94a3b8;
            padding: 4rem 0;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Loading 遮罩 -->
    <div id="loadingOverlay">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-3 fw-bold">分析中，請稍候...</div>
    </div>

    <!-- 頂部區塊 -->
    <header class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="display-5 fw-bold mb-3"><i data-lucide="cpu" class="me-2"></i>AI Podcast分析助手</h1>
                    <p class="lead opacity-75">串接 Whisper 與 Gemini API，提供 Podcast 深度洞察</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <div class="download-btn-group d-none" id="globalActions">
                        <button class="btn btn-outline-light btn-sm mb-2" onclick="downloadFile('srt')">
                            <i data-lucide="file-text" class="size-4"></i> 下載 SRT
                        </button>
                        <button class="btn btn-outline-light btn-sm mb-2" onclick="downloadFile('mp3')">
                            <i data-lucide="music" class="size-4"></i> 下載 MP3
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <!-- 輸入區塊 -->
        <section class="card glass-card p-4 mb-4">
            <div class="row g-3">
                <div class="col-lg-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i data-lucide="link"></i></span>
                        <input type="text" id="sourceUrl" class="form-control form-control-lg"
                            placeholder="貼上 YouTube 或 Apple Podcast 網址">
                    </div>
                </div>
                <div class="col-lg-4 d-flex gap-2">
                    <button class="btn btn-lg btn-primary flex-grow-1 fw-bold" onclick="runAnalysis()">
                        <i data-lucide="play" class="me-1"></i> 執行分析
                    </button>
                    <button class="btn btn-lg btn-outline-secondary" onclick="clearInput()">
                        <i data-lucide="trash-2"></i> 清除
                    </button>
                </div>
            </div>
        </section>

        <!-- 分析結果區域 -->
        <div id="resultsArea" class="d-none">
            <div class="row">
                <!-- 左側：核心洞察 -->
                <div class="col-lg-7">
                    <div class="card glass-card p-4 h-100">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h3 class="fw-bold text-primary" id="docTitle">報告標題</h3>
                            <span class="badge bg-success">Gemini</span>
                        </div>
                        <hr>
                        <h5 class="fw-bold mb-3"><i data-lucide="trending-up" class="me-2"></i>核心分析</h5>
                        <p id="insightContent" class="insight-text text-muted"></p>
                    </div>
                </div>

                <!-- 右側：精彩片段與下載 -->
                <div class="col-lg-5 mt-4 mt-lg-0">
                    <div class="card glass-card p-4 mb-4">
                        <h5 class="fw-bold mb-4"><i data-lucide="list-video" class="me-2"></i>精彩亮點</h5>
                        <div id="highlightsList">
                            <!-- 動態插入 -->
                        </div>
                    </div>

                    <div class="card glass-card p-4 border-primary border-1">
                        <h5 class="fw-bold mb-3"><i data-lucide="download" class="me-2"></i>檔案匯出</h5>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary d-flex justify-content-between align-items-center"
                                onclick="downloadFile('srt')">
                                <span>下載逐字稿 (.srt)</span>
                                <i data-lucide="arrow-down-to-line"></i>
                            </button>
                            <button class="btn btn-dark d-flex justify-content-between align-items-center"
                                onclick="downloadFile('mp3')">
                                <span>下載原始音訊 (.mp3)</span>
                                <i data-lucide="headphones"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 未讀取狀態 -->
        <div id="emptyState" class="empty-state">
            <i data-lucide="file-search" size="48" class="mb-3 opacity-25"></i>
            <h4>尚未執行分析</h4>
            <p>請輸入網址並點擊「執行分析」以讀取 Colab 處理結果</p>
        </div>
    </main>

    <footer class="text-center py-4 text-muted border-top bg-white mt-auto">
        <small>© 2026 AI Podcast分析助手 | 由 AI 驅動</small>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 初始化圖標
        lucide.createIcons();

        // 模擬從 Google Drive 讀取的 JSON 範例資料 (即附件內容)
        const mockData = {
            "title": "2026年3月9日：中東戰雲推升油價至111美元，就業疲軟與通膨復燃令聯準會陷決策兩難",
            "investment_insight": "當前市場正處於地緣政治衝擊、經濟數據降溫與貨幣政策滯後的「三力交匯期」。西德州原油（WTI）突破每桶111美元，主因在於荷姆茲海峽航運受阻導致中東產油國（如伊拉克）儲油設施飽和被迫減產，而非單純心理恐慌。儘管2月非農就業意外減少9.2萬人且失業率升至4.4%，理論上具備降息空間，但能源成本推升的通膨預期打亂了聯準會（Fed）如點陣圖預期的降息節奏。然而，從評價面觀察，美股七巨頭（Mag 7）預期本益比已藉由盈餘成長（EPS）追上而回落至23倍，顯示市場正在進行健康的均值回歸。此外，AI技術（如Palantir系統）在不對稱戰爭中的實戰應用，預示著科技生產力的長期趨勢並未因短期估值修正而改變。投資策略上，應區分「外部性衝擊」與「長期趨勢」，VIX指數飆升至30通常暗示市場進入情緒洗盤階段，左側機會正隨估值回調逐步顯現。",
            "highlights": [
                { "timeStart": "00:00:18", "timeEnd": "00:01:25", "desc": "國際油價飆破100美元與美股三大指數轉為負報酬之市況綜述。" },
                { "timeStart": "00:01:43", "timeEnd": "00:03:28", "desc": "解析中東能源供應鏈瓶頸：荷姆茲海峽停擺、各國儲油上限與亞洲國家受衝擊程度。" },
                { "timeStart": "00:04:17", "timeEnd": "00:06:24", "desc": "川普政府面臨的兩難：強硬對抗伊朗與抑制高油價通膨的政策博弈。" },
                { "timeStart": "00:10:02", "timeEnd": "00:11:35", "desc": "能源危機的外溢效果：天然氣短缺影響全球氮肥供應及半導體產業能源成本。" },
                { "timeStart": "00:24:12", "timeEnd": "00:25:38", "desc": "科技股估值分析：七巨頭本益比修正與均值回調，市場進入重新定價期。" }
            ]
        };

        function clearInput() {
            document.getElementById('sourceUrl').value = '';
            document.getElementById('resultsArea').classList.add('d-none');
            document.getElementById('emptyState').classList.remove('d-none');
            document.getElementById('globalActions').classList.add('d-none');
        }

        async function runAnalysis() {
            const url = document.getElementById('sourceUrl').value;
            if (!url) {
                alert('請輸入有效的網址');
                return;
            }

            // 顯示載入動畫
            const loader = document.getElementById('loadingOverlay');
            loader.style.display = 'flex';

            // 模擬呼叫 Colab/Laravel API 的延遲
            await new Promise(resolve => setTimeout(resolve, 2000));

            renderData(mockData);

            loader.style.display = 'none';
            document.getElementById('resultsArea').classList.remove('d-none');
            document.getElementById('emptyState').classList.add('d-none');
            document.getElementById('globalActions').classList.remove('d-none');
        }

        function renderData(data) {
            document.getElementById('docTitle').innerText = data.title;
            document.getElementById('insightContent').innerText = data.investment_insight;

            const listContainer = document.getElementById('highlightsList');
            listContainer.innerHTML = '';

            data.highlights.forEach(item => {
                const div = document.createElement('div');
                div.className = 'highlight-item';
                div.innerHTML = `
                <div class="mb-1">
                    <span class="timestamp-badge">${item.timeStart}</span> 
                    <span class="text-muted mx-1">→</span>
                    <span class="timestamp-badge">${item.timeEnd}</span>
                </div>
                <div class="fw-bold">${item.desc}</div>
            `;
                listContainer.appendChild(div);
            });
        }

        function downloadFile(type) {
            // 在實際開發中，這裡會是從 Laravel 後端或 Google Drive 下載的 URL
            const fileName = (type === 'srt') ? 'output.srt' : 'input_audio.mp3';
            console.log(`模擬下載: ${fileName}`);

            // 建立模擬訊息
            const msg = document.createElement('div');
            msg.className = 'alert alert-info position-fixed bottom-0 end-0 m-3';
            msg.innerHTML = `正在為您準備 <strong>${fileName}</strong> 下載中...`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
    </script>

</body>

</html>
