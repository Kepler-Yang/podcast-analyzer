name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 當你推送到 main 分支時觸發

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Inject Firebase Secrets
        run: |
          sed -i "s|VITE_FIREBASE_API_KEY|${{ secrets.FB_API_KEY }}|g" index.html
          sed -i "s|VITE_FIREBASE_AUTH_DOMAIN|${{ secrets.FB_AUTH_DOMAIN }}|g" index.html
          sed -i "s|VITE_FIREBASE_PROJECT_ID|${{ secrets.FB_PROJECT_ID }}|g" index.html
          sed -i "s|VITE_FIREBASE_STORAGE_BUCKET|${{ secrets.FB_STORAGE_BUCKET }}|g" index.html
          sed -i "s|VITE_FIREBASE_MESSAGING_SENDER_ID|${{ secrets.FB_MESSAGING_SENDER_ID }}|g" index.html
          sed -i "s|VITE_FIREBASE_APP_ID|${{ secrets.FB_APP_ID }}|g" index.html
          sed -i "s|VITE_FIREBASE_MEASUREMENT_ID|${{ secrets.FB_MEASUREMENT_ID }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # 部署整個目錄
